<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flow88 Mix Engine</title>
    <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Flow88 Mix Engine</p>
                <h1>Master Console</h1>
            </div>
        </header>

        <nav class="tab-nav" role="tablist" aria-label="Master modes">
            <button
                id="audio-tab-button"
                class="tab-button active"
                role="tab"
                aria-selected="true"
                aria-controls="audio-panel"
                type="button"
            >
                Audio Mix
            </button>
            <button
                id="video-tab-button"
                class="tab-button"
                role="tab"
                aria-selected="false"
                aria-controls="video-panel"
                type="button"
            >
                Video Master
            </button>
        </nav>

        <section id="audio-panel" class="tab-panel active" role="tabpanel" aria-labelledby="audio-tab-button">
            <section class="action-row" aria-label="Audio action controls">
                <div class="primary-actions">
                    <button id="refresh-audio-button" class="refresh-button" type="button">Refresh</button>
                    <button id="render-button" class="render-button" type="button">Render Mix</button>
                    <button id="open-source-audio-button" class="secondary-action-button" type="button">Open Source Audio</button>
                    <button id="open-output-audio-button" class="secondary-action-button" type="button">Open Output Folder</button>
                    <div class="sort-controls" role="group" aria-label="Audio sort controls">
                        <button id="sort-bpm-button" class="sort-button" type="button">Sort BPM</button>
                        <button id="sort-key-button" class="sort-button" type="button">Sort Key</button>
                        <button id="sort-az-button" class="sort-button" type="button">Sort A-Z</button>
                    </div>
                </div>
                <div class="status-wrap">
                    <p id="audio-status" class="status">Loading tracks...</p>
                    <div id="audio-progress" class="render-progress hidden" aria-hidden="true">
                        <span class="render-progress-bar"></span>
                    </div>
                </div>
            </section>

            <section class="table-shell" aria-label="Track list">
                <table class="track-table" role="grid">
                    <thead>
                        <tr class="table-header-row">
                            <th class="col-grip" scope="col" aria-label="Queue handle"></th>
                            <th class="col-title" scope="col">Title</th>
                            <th class="col-artist" scope="col">Artist</th>
                            <th class="col-key" scope="col">Key</th>
                            <th class="col-bpm" scope="col">BPM</th>
                            <th class="col-start" scope="col">Start</th>
                            <th class="col-duration" scope="col">Duration</th>
                        </tr>
                    </thead>
                    <tbody id="track-list-body" aria-live="polite"></tbody>
                </table>
                <div class="table-footer">
                    <span>Total Mix Length</span>
                    <strong id="audio-total-duration">--:--</strong>
                </div>
            </section>
        </section>

        <section id="video-panel" class="tab-panel" role="tabpanel" aria-labelledby="video-tab-button" hidden>
            <section class="action-row" aria-label="Video action controls">
                <div class="primary-actions">
                    <button id="refresh-video-button" class="refresh-button" type="button">Refresh</button>
                    <button id="master-video-button" class="render-button" type="button">Master Video</button>
                    <button id="preview-video-button" class="secondary-action-button" type="button">Generate Preview</button>
                    <button id="open-source-video-button" class="secondary-action-button" type="button">Open Source Video</button>
                    <button id="open-output-video-button" class="secondary-action-button" type="button">Open Output Folder</button>
                    <label class="profile-select-wrap" for="render-profile-select">
                        <span>Render Tier</span>
                        <select id="render-profile-select" class="profile-select"></select>
                    </label>
                    <label class="profile-select-wrap" for="transition-type-select">
                        <span>Transition</span>
                        <select id="transition-type-select" class="profile-select">
                            <option value="fade">fade</option>
                            <option value="wipeleft">wipeleft</option>
                            <option value="wiperight">wiperight</option>
                            <option value="slideleft">slideleft</option>
                            <option value="slideright">slideright</option>
                            <option value="circleopen">circleopen</option>
                            <option value="circleclose">circleclose</option>
                        </select>
                    </label>
                    <label class="transition-duration-wrap" for="transition-duration-range">
                        <span>Duration <strong id="transition-duration-value">1.0s</strong></span>
                        <input
                            id="transition-duration-range"
                            class="transition-duration-range"
                            type="range"
                            min="0.2"
                            max="3"
                            step="0.1"
                            value="1.0"
                        >
                    </label>
                    <label class="profile-select-wrap" for="transition-curve-select">
                        <span>Curve</span>
                        <select id="transition-curve-select" class="profile-select">
                            <option value="linear">linear</option>
                            <option value="easein">easein</option>
                            <option value="easeout">easeout</option>
                        </select>
                    </label>
                    <div class="sort-controls" role="group" aria-label="Video sort controls">
                        <button id="sort-video-az-button" class="sort-button" type="button">Sort A-Z</button>
                    </div>
                </div>
                <div class="status-wrap">
                    <p id="video-status" class="status">Loading videos...</p>
                    <p id="video-eta" class="status eta hidden"></p>
                    <div id="video-progress" class="render-progress determinate hidden" aria-hidden="true">
                        <span id="video-progress-bar" class="render-progress-bar"></span>
                    </div>
                </div>
            </section>

            <section class="table-shell" aria-label="Video clip list">
                <table class="track-table" role="grid">
                    <tbody id="video-list-body" aria-live="polite"></tbody>
                </table>
            </section>
        </section>
    </main>

    <script src="/frontend/app.js" defer></script>
</body>
</html>
